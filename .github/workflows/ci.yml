name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build -p ndwt
      - name: Test
        run: cargo test -p ndwt
      - name: Test (no default features)
        if: matrix.os == 'ubuntu-latest'
        run: cargo test -p ndwt --no-default-features
      - name: Build (x86-v4)
        if: matrix.os == 'ubuntu-latest'
        run: cargo build -p ndwt --features x86-v4

  build_wasm:
    name: Build (wasm32-unknown-unknown)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Build ndwt for WASM
        run: cargo build -p ndwt --target wasm32-unknown-unknown --no-default-features

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build docs
        run: cargo doc -p ndwt --no-deps --workspace --exclude ndwt-python
        env:
          RUSTDOCFLAGS: -D warnings

  python_testing:
    name: Test Python ${{ matrix.python-version }} Bindings
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"] #["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          pip-install: numpy pytest
          cache: "pip" # caching pip dependencies
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: maturin
      - name: build package
        run: cd ndwt-python; maturin develop
      - name: Test
        run: pytest
