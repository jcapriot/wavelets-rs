[build-system]
requires = ["maturin>=1.0,<2.0"]
build-backend = "maturin"

[project]
name = "ndwt"
classifiers = [
    "Development Status :: 1 - Planning",
    "Programming Language :: Python",
    "Programming Language :: Rust",
]
dependencies = ["numpy"]
dynamic = [
    "version",
    "description",
    "readme",
    "urls",
    "authors",
    "license",
    "keywords",
]

[tool.maturin]
module-name = "ndwt._ndwt_ext"
profile = "release"
editable-profile = "release"
